<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My GitHub Pages Site</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #c8f04a;
      --font-display: 'Georgia', serif;
      --font-body: 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 3rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-left: 2rem;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--text); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 3rem;
    }

    .hero {
      max-width: 640px;
      width: 100%;
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.1s;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 1.1;
      font-weight: normal;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.25s;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    p {
      font-size: 0.9rem;
      line-height: 1.8;
      color: var(--muted);
      max-width: 480px;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.4s;
    }

    .cta {
      display: inline-block;
      padding: 0.75rem 2rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.55s;
    }

    .cta:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .grid-line {
      position: fixed;
      top: 0; bottom: 0;
      width: 1px;
      background: var(--border);
      opacity: 0.4;
    }
    .grid-line:nth-child(1) { left: 25%; }
    .grid-line:nth-child(2) { left: 50%; }
    .grid-line:nth-child(3) { left: 75%; }

    footer {
      padding: 1.5rem 3rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="grid-line"></div>
  <div class="grid-line"></div>
  <div class="grid-line"></div>

  <header>
    <span class="logo">mysite</span>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main>
    <div class="hero">
      <p class="eyebrow">Welcome</p>
      <h1>Hello, I'm <em>building</em> something here.</h1>
      <p>This is the base minimum GitHub Pages setup. Edit this file to make it your own — swap the copy, update the styles, and push to your repo.</p>
      <a class="cta" href="about.html">Learn more →</a>
    </div>
  </main>

  <footer>
    <span>© 2026 mysite</span>
    <span>Built with GitHub Pages</span>
  </footer>

</body>
</html>
